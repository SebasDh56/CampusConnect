_format_version: "3.0"
_transform: true

consumers:
  - username: campusconnect-frontend-dev
    keyauth_credentials:
      - key: campusconnect-dev-api-key

services:
  - name: academic-service
    url: http://academic-service:3001
    routes:
      - name: academic-route
        paths:
          - /academic
        strip_path: true

  - name: payments-service
    url: http://payments-service:3002
    routes:
      - name: payments-route
        paths:
          - /payments
        strip_path: true

  - name: wellbeing-service
    url: http://wellbeing-service:3003
    routes:
      - name: wellbeing-route
        paths:
          - /wellbeing
        strip_path: true

  - name: notifications-service
    url: http://notifications-service:3004
    routes:
      - name: notifications-route
        paths:
          - /notifications
        strip_path: true

  - name: analytics-service
    url: http://analytics-service:3005
    routes:
      - name: analytics-route
        paths:
          - /analytics
        strip_path: true

plugins:
  - name: cors
    route: academic-route
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      preflight_continue: false
  - name: cors
    route: payments-route
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      preflight_continue: false
  - name: cors
    route: wellbeing-route
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      preflight_continue: false
  - name: cors
    route: notifications-route
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      preflight_continue: false
  - name: cors
    route: analytics-route
    config:
      origins:
        - http://localhost:5173
      methods:
        - GET
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - apikey
        - X-Correlation-Id
      exposed_headers:
        - X-Correlation-Id
      credentials: false
      preflight_continue: false
  - name: key-auth
    route: academic-route
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
  - name: key-auth
    route: payments-route
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
  - name: key-auth
    route: wellbeing-route
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
  - name: key-auth
    route: notifications-route
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
  - name: key-auth
    route: analytics-route
    config:
      key_names:
        - apikey
      key_in_header: true
      key_in_query: false
      key_in_body: false
      hide_credentials: true
