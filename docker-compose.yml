services:
  kong:
    image: kong:3.7
    container_name: campusconnect-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./infrastructure/gateway/kong.yml:/kong/declarative/kong.yml:ro
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: campusconnect-frontend:latest
    build:
      context: ./frontend
      args:
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8000}
        VITE_NOTIFICATIONS_API_URL: ${VITE_NOTIFICATIONS_API_URL:-http://localhost:3004}
        VITE_ANALYTICS_API_URL: ${VITE_ANALYTICS_API_URL:-http://localhost:3005}
        VITE_API_KEY: ${VITE_API_KEY:-campusconnect-dev-api-key}
    container_name: campusconnect-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: campusconnect-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-campusconnect}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-campusconnect}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infrastructure/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  academic-service:
    image: campusconnect-academic-service:latest
    build:
      context: ./services/academic-service
    container_name: campusconnect-academic-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 3001
      DATABASE_HOST: academic-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${ACADEMIC_DB_NAME:-academic_db}
      DATABASE_USER: ${ACADEMIC_DB_USER:-academic_user}
      DATABASE_PASSWORD: ${ACADEMIC_DB_PASSWORD:-academic_password}
    ports:
      - "3001:3001"
    depends_on:
      academic-db:
        condition: service_healthy
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  academic-db:
    image: postgres:16-alpine
    container_name: campusconnect-academic-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${ACADEMIC_DB_NAME:-academic_db}
      POSTGRES_USER: ${ACADEMIC_DB_USER:-academic_user}
      POSTGRES_PASSWORD: ${ACADEMIC_DB_PASSWORD:-academic_password}
    ports:
      - "5433:5432"
    volumes:
      - academic-db-data:/var/lib/postgresql/data
      - ./infrastructure/database/academic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  payments-service:
    image: campusconnect-payments-service:latest
    build:
      context: ./services/payments-service
    container_name: campusconnect-payments-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 3002
      DATABASE_HOST: payments-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${PAYMENTS_DB_NAME:-payments_db}
      DATABASE_USER: ${PAYMENTS_DB_USER:-payments_user}
      DATABASE_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_password}
    ports:
      - "3002:3002"
    depends_on:
      payments-db:
        condition: service_healthy
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  payments-db:
    image: postgres:16-alpine
    container_name: campusconnect-payments-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PAYMENTS_DB_NAME:-payments_db}
      POSTGRES_USER: ${PAYMENTS_DB_USER:-payments_user}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_password}
    ports:
      - "5434:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infrastructure/database/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  wellbeing-service:
    image: campusconnect-wellbeing-service:latest
    build:
      context: ./services/wellbeing-service
    container_name: campusconnect-wellbeing-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 3003
      DATABASE_HOST: wellbeing-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${WELLBEING_DB_NAME:-wellbeing_db}
      DATABASE_USER: ${WELLBEING_DB_USER:-wellbeing_user}
      DATABASE_PASSWORD: ${WELLBEING_DB_PASSWORD:-wellbeing_password}
    ports:
      - "3003:3003"
    depends_on:
      wellbeing-db:
        condition: service_healthy
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  wellbeing-db:
    image: postgres:16-alpine
    container_name: campusconnect-wellbeing-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WELLBEING_DB_NAME:-wellbeing_db}
      POSTGRES_USER: ${WELLBEING_DB_USER:-wellbeing_user}
      POSTGRES_PASSWORD: ${WELLBEING_DB_PASSWORD:-wellbeing_password}
    ports:
      - "5435:5432"
    volumes:
      - wellbeing-db-data:/var/lib/postgresql/data
      - ./infrastructure/database/wellbeing/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  notifications-service:
    image: campusconnect-notifications-service:latest
    build:
      context: ./services/notifications-service
    container_name: campusconnect-notifications-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 3004
      DATABASE_HOST: notifications-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${NOTIFICATIONS_DB_NAME:-notifications_db}
      DATABASE_USER: ${NOTIFICATIONS_DB_USER:-notifications_user}
      DATABASE_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD:-notifications_password}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: campus_user
      RABBITMQ_PASSWORD: campus_pass
      RABBITMQ_VHOST: campusconnect
      RABBITMQ_EXCHANGE: campusconnect.events
      RABBITMQ_QUEUE: notifications.events.queue
    ports:
      - "3004:3004"
    depends_on:
      notifications-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - campusconnect-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3004/health || exit 1"]
      interval: 30s
