      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  campusconnect-network:
    name: campusconnect-network
    driver: bridge

volumes:
  rabbitmq-data:
  academic-db-data:
  payments-db-data:
  wellbeing-db-data:
  notifications-db-data:
  analytics-db-data:
