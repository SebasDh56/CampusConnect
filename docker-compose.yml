    build:
      context: ./services/analytics-service
    container_name: campusconnect-analytics-service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      PORT: 3005
      DATABASE_HOST: analytics-db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${ANALYTICS_DB_NAME:-analytics_db}
      DATABASE_USER: ${ANALYTICS_DB_USER:-analytics_user}
      DATABASE_PASSWORD: ${ANALYTICS_DB_PASSWORD:-analytics_password}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: campus_user
      RABBITMQ_PASSWORD: campus_pass
      RABBITMQ_VHOST: campusconnect
      RABBITMQ_EXCHANGE: campusconnect.events
