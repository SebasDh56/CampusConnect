      retries: 5
      start_period: 30s

  notifications-db:
    image: postgres:16-alpine
    container_name: campusconnect-notifications-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME:-notifications_db}
      POSTGRES_USER: ${NOTIFICATIONS_DB_USER:-notifications_user}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASSWORD:-notifications_password}
